<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MTI Licensing Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      vertical-align: top;
    }

    th {
      background: #f4f4f4;
      text-align: left;
      position: sticky;
      top: 0;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }
  </style>
</head>

<body>

<h1>MTI Productions</h1>
<div id="count">Loading...</div>

<table>
  <thead>
    <tr>
      <th>Show</th>
      <th>Location</th>
      <th>Venue</th>
      <th>Organization</th>
      <th>Dates</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
fetch('/data/latest-mti.json')
  .then(res => res.json())
  .then(result => {

    const data = result.data;

    // show total count from API
    document.getElementById('count').innerText =
      "Total productions: " + result.count;

    const tbody = document.getElementById('rows');

    data.forEach(item => {
      const row = document.createElement('tr');

      row.innerHTML = `
        <td>${item.title || ""}</td>
        <td>${item.location_text || ""}</td>
        <td>${item.venue || ""}</td>
        <td>${item.organization || ""}</td>
        <td>${item.date_range || ""}</td>
      `;

      tbody.appendChild(row);
    });

  })
  .catch(err => {
    console.error(err);
    document.getElementById('count').innerText =
      "Failed to load data";
  });
</script>

</body>
</html>
