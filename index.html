<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MTI Licensing Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    input {
      margin: 5px;
      padding: 6px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    th {
      background: #f4f4f4;
      position: sticky;
      top: 0;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>MTI Productions</h1>
<div id="count">Loading...</div>

<div class="filters">
  <input id="titleFilter" placeholder="Filter by Show Title" />
  <input id="locationFilter" placeholder="Filter by Location" />
  <input id="venueFilter" placeholder="Filter by Theatre" />
  <input id="orgFilter" placeholder="Filter by Organization" />
  <input id="dateFilter" placeholder="Filter by Start Date (YYYY-MM-DD)" />
</div>

<table>
  <thead>
    <tr>
      <th>Show</th>
      <th>Location</th>
      <th>Venue</th>
      <th>Organization</th>
      <th>Dates</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
let allData = [];

function cleanOrg(org) {
  const bad = "Mti Test - Music Theatre Int'l- Licensing";
  if (!org || org.trim() === "" || org === bad) return "N/A";
  return org;
}

function render(data) {
  const tbody = document.getElementById('rows');
  tbody.innerHTML = "";

  data.forEach(item => {
    const row = document.createElement('tr');

    row.innerHTML = `
      <td>${item.title || ""}</td>
      <td>${item.location_text || ""}</td>
      <td>${item.venue || ""}</td>
      <td>${cleanOrg(item.organization)}</td>
      <td>${item.date_range || ""}</td>
    `;

    tbody.appendChild(row);
  });

  document.getElementById('count').innerText =
    "Total productions: " + data.length;
}

function applyFilters() {
  const title = document.getElementById('titleFilter').value.toLowerCase();
  const location = document.getElementById('locationFilter').value.toLowerCase();
  const venue = document.getElementById('venueFilter').value.toLowerCase();
  const org = document.getElementById('orgFilter').value.toLowerCase();
  const date = document.getElementById('dateFilter').value;

  const filtered = allData.filter(item => {
    return (
      (item.title || "").toLowerCase().includes(title) &&
      (item.location_text || "").toLowerCase().includes(location) &&
      (item.venue || "").toLowerCase().includes(venue) &&
      (cleanOrg(item.organization)).toLowerCase().includes(org) &&
      (date === "" || (item.start && item.start.includes(date)))
    );
  });

  render(filtered);
}

fetch('/data/latest-mti.json')
  .then(res => res.json())
  .then(result => {
    allData = result.data;

    render(allData);

    document.querySelectorAll("input").forEach(input => {
      input.addEventListener("input", applyFilters);
    });
  })
  .catch(err => {
    console.error(err);
    document.getElementById('count').innerText = "Failed to load data";
  });
</script>

</body>
</html>
